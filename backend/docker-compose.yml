version: "3.8"

services:
  backend:
    build: .
    command: npm run dev
    image: my-backend
    env_file:
      - .env
    expose:
      - "12000"

    volumes:
      - .:/app
      - /app/node_modules

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
