version: "3.8"

services:
  backend1:
    build: .
    command: npm run dev
    image: my-backend
    environment:
      SERVER_NAME: Backend-1

    env_file:
      - .env
    expose:
      - "12000"

    volumes:
      - .:/app
      - /app/node_modules

  backend2:
    build: .
    command: npm run dev
    image: my-backend
    environment:
      SERVER_NAME: Backend-2

    env_file:
      - .env
    expose:
      - "12000"

    volumes:
      - .:/app
      - /app/node_modules

  backend3:
    build: .
    image: my-backend
    environment:
      SERVER_NAME: Backend-3

    env_file:
      - .env
    expose:
      - "12000"

    volumes:
      - .:/app
      - /app/node_modules

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend1
      - backend2
      - backend3
